<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Shop PRO</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Connexion</h2>
    <input id="nom" placeholder="Nom complet">
    <input id="numero" placeholder="Numéro">
    <input id="quartier" placeholder="Quartier">
    <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
    <h1>🛒 Mon Shop PRO</h1>
</header>

<nav>
<ul>
    <li>Accueil</li>

    <li class="menu">Nos Produits
        <div class="submenu">
            <p onclick="filter('cosmetique')">Cosmétique</p>
            <p onclick="filter('soin')">Soins</p>
            <p onclick="filter('beaute')">Beauté</p>
        </div>
    </li>

    <li class="menu">À propos
        <div class="submenu">
            <p>Nous</p>
            <p>Contacts</p>
            <p>Localisation</p>
        </div>
    </li>
</ul>
</nav>

<!-- PRODUITS -->
<div id="products"></div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button onclick="order()">Commander</button>
    <button onclick="closeModal()">Fermer</button>
</div>

<script src="app.js"></script>
</body>
</html>
